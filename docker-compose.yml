services:
  postgres:
    image: postgres:16-alpine
    container_name: propeller_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: propeller
      POSTGRES_PASSWORD: propeller
      POSTGRES_DB: propeller_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propeller -d propeller_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: propeller_chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  bot:
    build: .
    container_name: propeller_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "app.main"]

volumes:
  postgres_data:
  chroma_data:
